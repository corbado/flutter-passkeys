name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      run_ceremonies:
        description: >-
          Run the passkey ceremonies. Only works on a device with a configured
          credential provider (a signed-in account); leave off for a bare CI
          emulator, where the ceremonies would hang.
        type: boolean
        default: false

jobs:
  android-patrol:
    name: Android patrol E2E
    runs-on: ubuntu-latest
    # Bounded so a stuck native prompt can never hang the pipeline.
    timeout-minutes: 30
    # Kept non-gating until it is proven stable on CI hardware.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.5"

      - name: Set up melos
        uses: bluefireteam/melos-action@v3

      - name: Activate patrol_cli
        run: |
          dart pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run patrol tests on an emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          working-directory: packages/passkeys/passkeys/example
          # android-emulator-runner executes the script line by line, so the
          # multi-line logic lives in a committed shell script invoked here.
          # The passkey ceremonies only run on an explicit workflow_dispatch.
          script: bash tool/run_integration_tests.sh "${{ inputs.run_ceremonies || 'false' }}"
